<!Doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <title>Study Tracker</title>

     <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="style.css">

   
    
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.css">

</head>
<body class="bg-success">
    <div class="wrapper">
        <img class="Hero-img" src="Image/Assets/Pasted image.png" width="100px">
        <h1>Login</h1>
        <div class="username">
            <p class="Description">Username</p>
            <input class="username" type="Username" placeholder="Enter Username">
            <i class="bi bi-person"></i>

        </div>
        <div class="password">
            <p class="Description2">Password</p>
            <input class="Password" type="password" placeholder="Enter Password"><i class="bi bi-lock"></i>
        </div>

        <a href="#" target="_blank">Forgot Password?</a>

        <div class="Remember-me">
            <input class="Remember-me" type="checkbox">Remember me
        </div>

        <div class="btn">
            <button type="button" placeholder="Login">Login</button>
        </div>

        <div class="Create-Acc">
            <button type="button" placeholder="Create Account">Create Account</button>
        </div>

    </div>
</body>
</html>
