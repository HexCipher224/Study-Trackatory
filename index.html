<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Study Tracker</title>
    <link rel="stylesheet" href="style.css">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.css">
</head>
<body>
    <h1>Login</h1>

    <div class="wrapper">
        <div class="username">
            <p>Username</p>
            <input class="username" type="Username" placeholder="Enter Username">
            <i class="bi bi-person"></i>

        </div>
        <div class="password">
            <p>Password</p>
            <input class="Password" type="password" placeholder="Enter Password"><i class="bi bi-lock"></i>
        </div>

        <a href="#" target="_blank">Forgot Password?</a>

        <div class="Remember-me">
            <input class="Remember-me" type="checkbox">Remember me
        </div>

        <div class="btn">
            <button type="submit" placeholder="Login">Login</button>
        </div>

        <div class="Create-Acc">
            <button type="button" placeholder="Create Account">Create Account
        </div>

    </div>
</body>
</html>
