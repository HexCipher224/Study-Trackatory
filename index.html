<!Doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <title>STUDY TRACKER</title>

     <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
     <link rel="stylesheet" href="style.css">

   
    
     <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.css">

</head>
<body class="bg-success" style="padding-top: 70px;">

    <nav class="navbar navbar-expand-lg navbar-dark bg-dark fixed-top">
        <div class="container-fluid">
            <a class="navbar-brand" href="index.html">Study Tracker</a>
            <div class="d-flex align-items-center gap-3">
                <a href="courses.html" class="nav-link text-white px-0">Courses</a>
                <a href="tracker.html" class="nav-link text-white px-0">Tracker</a>
                <a href="index.html" data-logout="true" class="nav-link text-white px-0">Logout</a>
            </div>
        </div>
    </nav>

    <main class="wrapper" aria-label="login form">
        <img class="Hero-img" src="Image/Assets/Pasted image.png" width="100" alt="Study Tracker logo">
        <h1>Welcome back</h1>
        <p class="subtitle">Log in to track lessons, set reminders, and celebrate streaks.</p>
        <p class="study-tip">Tip: Review yesterday's notes before studying a new module.</p>
        <form id="loginForm" class="login-form">
            <label for="loginUsername">Username</label>
            <div class="input-row">
                <input id="loginUsername" name="username" type="text" placeholder="Enter username">
                <i class="bi bi-person input-icon" aria-hidden="true"></i>
            </div>

            <label for="loginPassword">Password</label>
            <div class="input-row">
                <input id="loginPassword" name="password" type="password" placeholder="Enter password">
            </div>

            <div class="helper-row">
                <label class="remember-label">
                    <input type="checkbox">
                    Remember me
                </label>
                <small class="link-button">Forgot password?</small>
            </div>

            <div id="loginMessage" class="status-message"></div>
            <div class="form-actions">
                <button type="submit" class="primary">Login</button>
                <a href="register.html" class="secondary secondary-link">Create account</a>
            </div>
        </form>
    </main>
    <script src="index.js" defer></script>
</body>
</html>
